<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Serviços</title>
    <meta name="description" content="Encontre profissionais qualificados na USA Serviços. Conectamos você a talentos locais com portfólio real, avaliações verificadas e contato direto via WhatsApp. Confira!">
    <meta property="og:image" content="https://usaservicos.com.br/metaimg.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">

    <style>
        :root {
            --usa-green: #27ae60;
            --usa-yellow: #fcc602;
            --usa-blue: #164e91;
            --dark: #0f172a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: linear-gradient(155deg, var(--dark) 0%, var(--usa-blue) 10%, var(--usa-green) 60%, var(--usa-yellow) 120%);
            min-height: -webkit-fill-available;
            position: relative;
            background-attachment: fixed;
            background-size: 100% 100vh; 

        }

        .emoji-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        .emoji-bg span {
            position: absolute;
            opacity: 0.4; 
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .aviso-manutencao {
            background: linear-gradient(135deg, #164e91 0%, #27ae60 100%);
            color: #fcff65;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 10;
            position: relative;
        }

        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 5;
            position: relative;
        }

        .search-box {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 35px 25px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }

        .brand-header {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: var(--usa-blue);
            letter-spacing: -1px;
        }

        .search-box h2 {
            color: #000;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .field-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .field-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #656e88;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            height: 55px;
            padding: 0 15px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 1rem;
            background-color: #f8fafc;
            outline: none;
            color: var(--dark);
        }

        .btn-action {
            width: 100%;
            height: 60px;
            background-color: var(--usa-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .trust-info {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-card {
            padding: 10px;
            background: #eefef5;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--usa-blue);
            border: 1px solid #929292;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action:active {
           transform: scale(0.98);
           background-color: #0d3a6d;
        }

        .menu-container { position: fixed; top: 55px; right: 15px; z-index: 999; }
        
        .menu-toggle { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            background: rgba(0,0,0,0.3); 
            padding: 10px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
        }

        .menu-toggle span { 
            width: 22px; 
            height: 2px; 
            background-color: #fff; 
            border-radius: 2px; 
        }

        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 50px; 
            right: 0; 
            background: #fff; 
            min-width: 180px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border-radius: 12px; 
            border: 1px solid #000; 
            overflow: hidden; 
        }

        .dropdown-menu a { 
            display: block; 
            padding: 12px 20px; 
            color: var(--dark); 
            text-decoration: none; 
            font-size: 0.9rem; 
            text-align: left; 
        }

        .show { display: block !important; }

        @media (max-height: 700px) {
            .search-box { padding: 20px 15px; }
            .brand-header { font-size: 1.7rem; }
            .search-box h2 { margin-bottom: 15px; }
            .field-group { margin-bottom: 12px; }
            select, .btn-action { height: 48px; }
            .trust-info { margin-top: 15px; }
        }

        .engrenagem-pequena { animation: girar 3s linear infinite; display: inline-block; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="emoji-bg">
            <span style="top: 5%; left: 10%; font-size: 50px; transform: rotate(-15deg);">🛠️</span>
            <span style="top: 15%; right: 15%; font-size: 45px; transform: rotate(20deg);">🔧</span>
            <span style="top: 35%; left: 5%; font-size: 55px; transform: rotate(-25deg);">🔨</span>
            <span style="top: 45%; right: 10%; font-size: 40px; transform: rotate(30deg);">🪚</span>
            <span style="top: 75%; left: 12%; font-size: 50px; transform: rotate(-10deg);">🪜</span>
            <span style="top: 85%; right: 15%; font-size: 45px; transform: rotate(45deg);">🪛</span>
            <span style="top: 10%; left: 40%; font-size: 35px; transform: rotate(15deg);">💡</span>
            <span style="top: 25%; right: 40%; font-size: 50px; transform: rotate(-20deg);">🔦</span>
            <span style="top: 60%; left: 45%; font-size: 40px; transform: rotate(10deg);">🧱</span>
            <span style="top: 80%; right: 45%; font-size: 55px; transform: rotate(-35deg);">⚙️</span>
            <span style="top: 50%; left: 15%; font-size: 30px; transform: rotate(12deg);">📐</span>
            <span style="top: 5%; right: 5%; font-size: 40px; transform: rotate(-40deg);">📏</span>
            <span style="top: 30%; left: 25%; font-size: 35px; transform: rotate(25deg);">🏗️</span>
            <span style="top: 65%; right: 25%; font-size: 45px; transform: rotate(-12deg);">🪵</span>
            <span style="top: 90%; left: 35%; font-size: 30px; transform: rotate(5deg);">🔌</span>
            <span style="top: 92%; right: 5%; font-size: 35px; transform: rotate(-30deg);">📎</span>
        </div>

        <div class="aviso-manutencao">
            <span class="engrenagem-pequena">⚙️</span> SITE EM MANUTENÇÃO: Novidades em breve!
        </div>

        <div class="menu-container">
          <button class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu de navegação">
           <span></span><span></span><span></span>
         </button>
            <div id="myDropdown" class="dropdown-menu">
                <a href="cadastro.html">Quero me Cadastrar</a>
                <a href="minhaconta.html">Minha Conta</a>
                <a href="sobreusa.html">Sobre Nós</a>
                <a style="color: red;" href="#">Ajuda</a>
            </div>
        </div>

        <main class="form-side">
            <div class="search-box">
                <h1 class="brand-header">USA Serviços</h1>
                <h2>Encontre um especialista</h2>

                <div class="field-group">
                    <label>📍 Cidade</label>
                    <select>
                        <option disabled selected>Selecione a cidade...</option>
                        <option>Chapecó</option>
                        <option>Joinville</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>🛠️ Serviço</label>
                    <select>
                        <option disabled selected>Escolha o serviço...</option>
                        <option>Encanador</option>
                        <option>Pintor</option>
                        <option>Eletricista</option>
                        <option>Montador de móveis</option>
                        <option>Pedreiro</option>
                        <option>Técnico em Ar-condicionado</option>
                        <option>Lavagem de estofado</option>
                        <option>Marido de Aluguel</option>
                        <option>Faxineira</option>
                        <option>Passadeira</option>
                        <option>Mudanças e Carretos</option>
                        <option>Jardinagem</option>
                        <option>Conserto de Máquina de lavar</option>
                        <option>Conserto de Computadores</option>
                        <option>Adestrador de cães</option>
                        <option>Aulas particulares(Reforço escolar)</option>
                        <option>Manicure e Pedicure</option>
                        <option>Consulta Jurídica</option>
                        <option>Assistência Técnica em celular</option>
                        <option>Manutenção de Geladeiras e Freezer</option>
                    </select>
                    </select>
                </div>

                <button class="btn-action">Buscar Profissional</button>

                <div class="trust-info">
                    <div class="info-card">✓ Verificados</div>
                    <div class="info-card">⚡ Imediato</div>
                    <div class="info-card">🛡️ Segurança</div>
                    <div class="info-card">⭐ Avaliados</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
        window.onclick = function(e) {
            if (!e.target.closest('.menu-container')) {
                var d = document.getElementById("myDropdown");
                if (d && d.classList.contains('show')) d.classList.remove('show');
            }
        }
    </script>
</body>
</html>
