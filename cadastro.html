<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USA Serviços</title>
    <meta name="description" content="Aumente sua clientela na USA Serviços! 
        Divulgue seu trabalho e receba pedidos de orçamento direto no seu WhatsApp. 
        Cadastre-se agora e conquiste novos clientes.">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">

    <style>
        :root {
            --usa-green: #27ae60;
            --usa-yellow: #fcc602;
            --usa-blue: #164e91;
            --dark: #0f172a;
            --border: #e2e8f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh; 
            background: linear-gradient(155deg, var(--dark) 0%, var(--usa-blue) 10%, var(--usa-green) 60%, var(--usa-yellow) 120%);
            background-attachment: fixed;
            background-size: cover;
            position: relative;
        }

        .emoji-bg {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .emoji-bg span {
            position: absolute;
            opacity: 0.15;
        }

        
        .aviso-manutencao {
            background: linear-gradient(135deg, #164e91 0%, #27ae60 100%);
            color: #fcff65;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 10;
            position: relative;
        }

        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            z-index: 5;
        }

        .search-box {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-header {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
            text-transform: uppercase;
            color: var(--usa-blue);
        }

        .search-box h2 {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .field-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .field-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input:not([type="file"]),
        select {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background-color: #fff;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--usa-blue);
            box-shadow: 0 0 0 3px rgba(22, 78, 145, 0.1);
        }

        input[type="file"] {
            width: 100%;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }

        input[type="file"]::file-selector-button {
            background: #f1f5f9;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            color: var(--usa-blue);
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            transition: 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: #e2e8f0;
        }

        .btn-action {
            width: 100%;
            height: 56px;
            background-color: var(--usa-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-action:hover { background-color: #1a5bb0; }
        .btn-action:active { transform: scale(0.98); }

        .trust-info {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-card {
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-container { position: fixed; top: 55px; right: 15px; z-index: 999; }
        
        .menu-toggle { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            background: rgba(0,0,0,0.3);
            padding: 10px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
        }

        .menu-toggle span { 
            width: 22px; 
            height: 2px; 
            background-color: #fff; 
            border-radius: 2px; 
        }

        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 50px; 
            right: 0; 
            background: #fff; 
            min-width: 180px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border-radius: 12px; 
            border: 1px solid #000; 
            overflow: hidden; 
        }

        .dropdown-menu a { 
            display: block; 
            padding: 12px 20px; 
            color: var(--dark); 
            text-decoration: none; 
            font-size: 0.9rem; 
            text-align: left; 
        }

        .show { display: block !important; }

        .engrenagem-pequena { animation: girar 3s linear infinite; display: inline-block; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .home-container {
        position: fixed;
        top: 55px;
        left: 15px;
        z-index: 999;
        }

        .btn-home {
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.3);
        padding: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        font-size: 20px;
        line-height: 1;
        }

        .btn-home:hover {
        background: rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

    <div class="page-wrapper">
        <div class="emoji-bg">
            <span style="top: 5%; left: 10%; font-size: 50px; transform: rotate(-15deg);">🛠️</span>
            <span style="top: 15%; right: 15%; font-size: 45px; transform: rotate(20deg);">🔧</span>
            <span style="top: 35%; left: 5%; font-size: 55px; transform: rotate(-25deg);">🔨</span>
            <span style="top: 45%; right: 10%; font-size: 40px; transform: rotate(30deg);">🪚</span>
            <span style="top: 75%; left: 12%; font-size: 50px; transform: rotate(-10deg);">🪜</span>
            <span style="top: 85%; right: 15%; font-size: 45px; transform: rotate(45deg);">🪛</span>
            <span style="top: 10%; left: 40%; font-size: 35px; transform: rotate(15deg);">💡</span>
            <span style="top: 25%; right: 40%; font-size: 50px; transform: rotate(-20deg);">🔦</span>
            <span style="top: 60%; left: 45%; font-size: 40px; transform: rotate(10deg);">🧱</span>
            <span style="top: 80%; right: 45%; font-size: 55px; transform: rotate(-35deg);">⚙️</span>
            <span style="top: 50%; left: 15%; font-size: 30px; transform: rotate(12deg);">📐</span>
            <span style="top: 5%; right: 5%; font-size: 40px; transform: rotate(-40deg);">📏</span>
            <span style="top: 30%; left: 25%; font-size: 35px; transform: rotate(25deg);">🏗️</span>
            <span style="top: 65%; right: 25%; font-size: 45px; transform: rotate(-12deg);">🪵</span>
            <span style="top: 90%; left: 35%; font-size: 30px; transform: rotate(5deg);">🔌</span>
            <span style="top: 92%; right: 5%; font-size: 35px; transform: rotate(-30deg);">📎</span>
        </div>

        <div class="aviso-manutencao">
            <span class="engrenagem-pequena">⚙️</span> SITE EM MANUTENÇÃO: Novidades em breve!
        </div>

        <div class="menu-container">
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
          <div class="menu-container">
    <button class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>
              <div class="home-container">
    <a href="/" class="btn-home" aria-label="Voltar para Início">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>
</div>
    <div id="myDropdown" class="dropdown-menu">
        <a href="minhaconta.html">Minha Conta</a>
        <a style="color: red;" href="ajuda.html">Ajuda</a>
    </div>
</div>

        </div>

       <main class="form-side">
    <form class="search-box" id="cadastroForm">
        <h1 class="brand-header">USA Serviços</h1>
        <h2>Quero me cadastrar</h2>

        <div class="field-group">
            <label>👤 Nome completo</label>
            <input type="text" placeholder="Digite seu nome completo" required>
        </div>

        <div class="field-group">
            <label>📱 Telefone/Whatsapp</label>
            <input type="tel" placeholder="(00) 00000-0000" required>
        </div>

        <div class="field-group">
            <label>✉️ Email</label>
            <input type="email" placeholder="seu@email.com" required>
        </div>

        <div class="field-group">
            <label>🆔 CPF</label>
            <input type="text" placeholder="000.000.000-00" required>
        </div>

        <div class="field-group">
            <label>🛠️ Especialidade</label>
            <select required>
                <option value="" disabled selected>Escolha sua profissão...</option>
                <option>Encanador</option>
                <option>Pintor</option>
                <option>Eletricista</option>
                <option>Montador de móveis</option>
                <option>Pedreiro</option>
                <option>Técnico em Ar-condicionado</option>
                <option>Lavagem de estofado</option>
                <option>Marido de Aluguel</option>
                <option>Faxineira</option>
                <option>Passadeira</option>
                <option>Mudanças e Carretos</option>
                <option>Jardinagem</option>
                <option>Conserto de Máquina de lavar</option>
                <option>Conserto de Computadores</option>
                <option>Adestrador de cães</option>
                <option>Aulas particulares(Reforço escolar)</option>
                <option>Manicure e Pedicure</option>
                <option>Consulta Jurídica</option>
                <option>Assistência Técnica em celular</option>
                <option>Manutenção de Geladeiras e Freezer</option>
            </select>
        </div>

        <div class="field-group">
            <label>📍 Cidade</label>
            <select required>
                <option value="" disabled selected>Selecione sua cidade...</option>
                <option>Chapecó</option>
                <option>Joinville</option>
            </select>
        </div>

        <div class="field-group">
            <label>📸 Foto do perfil ou logomarca</label>
            <input type="file" accept="image/*" required>
        </div>

        <button type="submit" class="btn-action">Finalizar Cadastro</button>
    </form>
</main>

    </div>

   <script>
    function toggleMenu() { 
        document.getElementById("myDropdown").classList.toggle("show"); 
    }

    window.onclick = function(e) {
        if (!e.target.closest('.menu-container')) {
            var d = document.getElementById("myDropdown");
            if (d && d.classList.contains('show')) d.classList.remove('show');
        }
    }

    const form = document.getElementById('cadastroForm');
    
    form.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault(); 
                const focusable = form.querySelectorAll('input, select, button');
                const index = Array.from(focusable).indexOf(e.target);
                
                if (index > -1 && focusable[index + 1]) {
                    focusable[index + 1].focus();
                }
            }
        }
    });
    form.onsubmit = function(e) {
        e.preventDefault();
        alert("Em breve será possível fazer o cadastro, volte em outro momento");
    };
</script>

</body>
</html>
