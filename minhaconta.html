<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Serviços - Login</title>
    <link href="https://googleapis.com" rel="stylesheet">
   <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">

    <style>
        :root {
            --usa-green: #27ae60;
            --usa-yellow: #fcc602;
            --usa-blue: #164e91;
            --dark: #0f172a;
            --border: #e2e8f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh; 
            background: linear-gradient(155deg, var(--dark) 0%, var(--usa-blue) 10%, var(--usa-green) 60%, var(--usa-yellow) 120%);
            background-attachment: fixed;
            background-size: cover;
            position: relative;
        }

        .emoji-bg {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .emoji-bg span {
            position: absolute;
            opacity: 0.15;
        }

        .aviso-manutencao {
            background: linear-gradient(135deg, #164e91 0%, #27ae60 100%);
            color: #fcff65;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 10;
            position: relative;
        }

        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            z-index: 5;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .brand-header {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
            text-transform: uppercase;
            color: var(--usa-blue);
        }

        .login-box h2 {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .field-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .field-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background-color: #fff;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--usa-blue);
            box-shadow: 0 0 0 3px rgba(22, 78, 145, 0.1);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--usa-blue);
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-action {
            width: 100%;
            height: 56px;
            background-color: var(--usa-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-action:hover { background-color: #1a5bb0; }
        .btn-action:active { transform: scale(0.98); }

        .menu-container { position: fixed; top: 55px; right: 15px; z-index: 999; }
        
        .menu-toggle { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            background: rgba(0,0,0,0.3);
            padding: 10px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
        }

        .menu-toggle span { 
            width: 22px; 
            height: 2px; 
            background-color: #fff; 
            border-radius: 2px; 
        }

        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 50px; 
            right: 0; 
            background: #fff; 
            min-width: 180px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            overflow: hidden; 
        }

        .dropdown-menu a { 
            display: block; 
            padding: 12px 20px; 
            color: var(--dark); 
            text-decoration: none; 
            font-size: 0.9rem; 
            text-align: left; 
        }

        .dropdown-menu a:hover { background: #f8fafc; }

        .show { display: block !important; }

        .engrenagem-pequena { animation: girar 3s linear infinite; display: inline-block; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
    .form-side {
        align-items: flex-start; 
        padding-top: 100px;
    }
}
@media (max-width: 600px) {
    body, html {
        overflow: hidden;
        height: 100%;    
        position: fixed; 
        width: 100%;
    }

    .page-wrapper {
        height: 100vh;
        overflow: hidden;
    }
} 
        
        .home-container {
        position: fixed;
        top: 55px;
        left: 15px;
        z-index: 999;
        }

        .btn-home {
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.3);
        padding: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        font-size: 20px;
        line-height: 1;
        }

        .btn-home:hover {
        background: rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="emoji-bg">
        <span style="top: 5%; left: 10%; font-size: 50px; transform: rotate(-15deg);">🛠️</span>
        <span style="top: 15%; right: 15%; font-size: 45px; transform: rotate(20deg);">🔧</span>
        <span style="top: 35%; left: 5%; font-size: 55px; transform: rotate(-25deg);">🔨</span>
        <span style="top: 45%; right: 10%; font-size: 40px; transform: rotate(30deg);">🪚</span>
        <span style="top: 75%; left: 12%; font-size: 50px; transform: rotate(-10deg);">🪜</span>
        <span style="top: 85%; right: 15%; font-size: 45px; transform: rotate(45deg);">🪛</span>
        <span style="top: 10%; left: 40%; font-size: 35px; transform: rotate(15deg);">💡</span>
        <span style="top: 25%; right: 40%; font-size: 50px; transform: rotate(-20deg);">🔦</span>
        <span style="top: 60%; left: 45%; font-size: 40px; transform: rotate(10deg);">🧱</span>
        <span style="top: 80%; right: 45%; font-size: 55px; transform: rotate(-35deg);">⚙️</span>
        <span style="top: 20%; left: 25%; font-size: 30px; transform: rotate(10deg);">📐</span>
        <span style="top: 55%; right: 25%; font-size: 40px; transform: rotate(-15deg);">📏</span>
        <span style="top: 90%; left: 35%; font-size: 35px; transform: rotate(20deg);">🧰</span>
        <span style="top: 30%; left: 60%; font-size: 45px; transform: rotate(-10deg);">🔌</span>
        <span style="top: 70%; right: 60%; font-size: 38px; transform: rotate(15deg);">👷</span>
        <span style="top: 5%; right: 30%; font-size: 32px; transform: rotate(-25deg);">🎨</span>
        <span style="top: 50%; left: 20%; font-size: 42px; transform: rotate(40deg);">🚿</span>
        <span style="top: 15%; left: 70%; font-size: 35px; transform: rotate(-5deg);">🚪</span>
    </div>


    <div class="aviso-manutencao">
        <span class="engrenagem-pequena">⚙️</span> SITE EM MANUTENÇÃO: Novidades em breve!
    </div>

    <div class="menu-container">
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <div class="home-container">
    <a href="/" class="btn-home" aria-label="Voltar para Início">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>
</div>
        <div id="myDropdown" class="dropdown-menu">
            <a href="cadastro.html">Quero me Cadastrar</a>
            <a style="color: #e11d48;" href="#">Ajuda</a>
        </div>
    </div>

    <main class="form-side">
        <form class="login-box" id="loginForm">
            <h1 class="brand-header">USA Serviços</h1>
            <h2>Acesse sua conta</h2>

            <div class="field-group">
                <label>✉️ Email</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>

            <div class="field-group">
                <label>🔑 Senha</label>
                <input type="password" placeholder="Digite sua senha" required>
            </div>

            <a href="#" class="forgot-password" onclick="alert('Funcionalidade em desenvolvimento')">Esqueceu a senha?</a>

            <button type="submit" class="btn-action">Entrar</button>
        </form>
    </main>
</div>

<script>
    function toggleMenu() { 
        document.getElementById("myDropdown").classList.toggle("show"); 
    }

    window.onclick = function(e) {
        if (!e.target.closest('.menu-container')) {
            var d = document.getElementById("myDropdown");
            if (d && d.classList.contains('show')) d.classList.remove('show');
        }
    }

    const form = document.getElementById('loginForm');
    form.onsubmit = function(e) {
        e.preventDefault();
        alert("O sistema de login estará disponível em breve!");
    };
</script>

</body>
</html>
